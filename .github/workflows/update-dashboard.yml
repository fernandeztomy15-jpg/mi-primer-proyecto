name: Update Macro Dashboard

on:
  schedule:
    - cron: "0 8 * * 1"   # Todos los lunes a las 8:00 UTC
  workflow_dispatch:        # Disparo manual desde GitHub Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          INEGI_API_KEY: ${{ secrets.INEGI_API_KEY }}
          BANXICO_API_KEY: ${{ secrets.BANXICO_API_KEY }}
        run: python fetch_data.py

      - name: Generate dashboard
        run: python generate_dashboard.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # index.html está en la raíz

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
